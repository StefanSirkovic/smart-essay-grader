name: CI Pipeline

on:
  push:
    branches:
      - main
      - feature/backend
  pull_request:
    branches:
      - main
      - feature/backend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run tests
        run: mvn clean verify