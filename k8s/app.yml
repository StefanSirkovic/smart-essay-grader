apiVersion: apps/v1
kind: Deployment
metadata:
  name: smart-essay-app
  namespace: essay-grader
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smart-essay-app
  template:
    metadata:
      labels:
        app: smart-essay-app
    spec:
      containers:
        - name: smart-essay-app
          image: smart-essay-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/SmartEssayGrader
            - name: SPRING_DATASOURCE_USERNAME
              value: admin
            - name: SPRING_DATASOURCE_PASSWORD
              value: admin

            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092

            - name: SPRING_DATA_REDIS_HOST
              value: redis

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET

            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: AI_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: smart-essay-app
  namespace: essay-grader
spec:
  type: NodePort
  selector:
    app: smart-essay-app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080