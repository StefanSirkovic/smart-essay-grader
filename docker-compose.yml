version: "3.9"

services:
  db:
    image: postgres:17
    container_name: smart-essay-db

    environment:
      POSTGRES_DB: smartEssayGrader
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

    ports:
      - "5432:5432"

    volumes:
        - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
